# Copilot optional LOCAL-DEV infra: Redis 7 + Qdrant (localhost-only publish)
# NOT required for RC1.2 production INFRA_PASS — prefer native systemd services.
# Usage: docker compose -f docker-compose.copilot.yml up -d
# BullMQ must use Redis on host port 6380 — never legacy Redis 3.x on 6379.
# Backup: docker run --rm -v copilot_redis_data:/data -v ${PWD}/backups:/backup alpine tar czf /backup/redis.tgz -C /data .

networks:
  copilot_net:
    name: copilot_net
    driver: bridge

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - copilot_redis:/data
    networks:
      - copilot_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  qdrant:
    image: qdrant/qdrant:v1.13.2
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - copilot_qdrant:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    networks:
      - copilot_net
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | head -n1 | grep -q 200'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  copilot_redis:
    name: copilot_redis_data
  copilot_qdrant:
    name: copilot_qdrant_data
