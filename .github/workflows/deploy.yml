name: Deploy to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual deployment

jobs:
  deploy:
    name: Deploy Lease Management to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      # ===== BUILD FRONTEND =====
      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENV: production

      # ===== DEPLOY FRONTEND =====
      - name: Deploy Frontend to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: ${{ secrets.VPS_FRONTEND_PATH }}
          strip_components: 1
          rm: true

      # ===== CREATE PRODUCTION CONFIG =====
      - name: Create Production Configuration File
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ${{ secrets.VPS_BACKEND_PATH }}
            cat > ${{ secrets.VPS_BACKEND_PATH }}/config.production.env << 'EOF'
            # PRODUCTION CONFIGURATION - Auto-generated by GitHub Actions
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=${{ secrets.DB_PORT }}
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            
            PORT=${{ secrets.BACKEND_PORT || 5002 }}
            NODE_ENV=production
            
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            JWT_EXPIRE=7d
            
            CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}
            
            RATE_LIMIT_WINDOW_MS=900000
            RATE_LIMIT_MAX_REQUESTS=100
            
            MAX_FILE_SIZE=10485760
            UPLOAD_PATH=${{ secrets.UPLOAD_PATH || '/var/www/uploads' }}
            
            LOG_LEVEL=warn
            LOG_FILE=/var/log/emirates-lease-flow/app.log
            EOF
            
            # Secure the config file
            chmod 600 ${{ secrets.VPS_BACKEND_PATH }}/config.production.env
            echo "✅ Production config created and secured"

      # ===== DEPLOY BACKEND =====
      - name: Deploy Backend to VPS 
        uses: appleboy/scp-action@master 
        with: 
          host: ${{ secrets.VPS_HOST }} 
          username: ${{ secrets.VPS_USERNAME }} 
          key: ${{ secrets.VPS_SSH_KEY }} 
          port: ${{ secrets.VPS_PORT }} 
          source: "backend/*,!backend/config.env,!backend/config.*.env,!backend/node_modules" 
          target: ${{ secrets.VPS_BACKEND_PATH }} 
          strip_components: 1 
          rm: false 
          overwrite: true

      # ===== SETUP AND RESTART BACKEND =====
      - name: Install Dependencies and Restart Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_BACKEND_PATH }}
            
            # Create necessary directories
            mkdir -p logs uploads
            
            # Install production dependencies
            npm install --production
            
            # Run database migrations if they exist
            if [ -f "src/scripts/runMigrations.js" ]; then
              NODE_ENV=production node src/scripts/runMigrations.js || echo "⚠️  Migrations skipped or failed"
            fi
            
            # Restart with PM2 using correct entry point and environment
            pm2 delete leasemanagement-backend 2>/dev/null || true
            pm2 start src/server.js --name leasemanagement-backend --node-args="--max-old-space-size=2048" -i 2 --env production
            pm2 save
            
            echo "✅ Backend deployed and restarted successfully"

      # ===== HEALTH CHECK =====
      - name: Wait for Backend to Start
        run: sleep 10

      - name: Health Check
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            echo "Checking backend health..."
            response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${{ secrets.BACKEND_PORT || 5002 }}/health || echo "000")
            if [ "$response" = "200" ]; then
              echo "✅ Backend is healthy (HTTP 200)"
              pm2 list
            else
              echo "❌ Backend health check failed (HTTP $response)"
              pm2 logs leasemanagement-backend --lines 50
              exit 1
            fi

      # ===== NOTIFICATION =====
      - name: Deployment Success Notification
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ DEPLOYMENT COMPLETED SUCCESSFULLY!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📦 Frontend: Deployed to ${{ secrets.VPS_FRONTEND_PATH }}"
          echo "🚀 Backend:  Restarted with PM2 (production mode)"
          echo "🔒 Config:   Using config.production.env"
          echo "🌐 API URL:  ${{ secrets.VITE_API_URL }}"
          echo "🗄️  Database: Connected to production DB"
          echo ""
          echo "🔍 Next Steps:"
          echo "  1. Test the application at: ${{ secrets.CORS_ORIGIN }}"
          echo "  2. Check API health: ${{ secrets.VITE_API_URL }}/health"
          echo "  3. Monitor logs: pm2 logs leasemanagement-backend"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Deployment Failed Notification
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "❌ DEPLOYMENT FAILED!"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "Please check the logs above for details."
          echo ""
          echo "Common issues:"
          echo "  - Missing GitHub Secrets"
          echo "  - SSH connection failure"
          echo "  - Database connection error"
          echo "  - NPM install failed"
          echo "  - PM2 restart failed"
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          exit 1
