name: Deploy Real Estate to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allow manual deployment

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            backend/package-lock.json

      # ===== BUILD FRONTEND =====
      - name: Install Frontend Dependencies
        run: npm ci

      - name: Build Frontend
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ENV: production

      # ===== DEPLOY FRONTEND =====
      - name: Deploy Frontend to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "dist/*"
          target: ${{ secrets.VPS_FRONTEND_PATH }}
          strip_components: 1
          rm: true
          timeout: 10m

      # ===== DEPLOY BACKEND =====
      - name: Deploy Backend to VPS 
        uses: appleboy/scp-action@master 
        with: 
          host: ${{ secrets.VPS_HOST }} 
          username: ${{ secrets.VPS_USERNAME }} 
          key: ${{ secrets.VPS_SSH_KEY }} 
          port: ${{ secrets.VPS_PORT }} 
          source: "backend/*" 
          target: ${{ secrets.VPS_BACKEND_PATH }} 
          strip_components: 1 
          rm: false 
          overwrite: true
          timeout: 10m

      # ===== RESTART BACKEND SERVICE =====
      - name: Install Dependencies and Restart Backend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 10m
          command_timeout: 30m
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            cd ${{ secrets.VPS_BACKEND_PATH }}
            npm install --production
            npm run migrate
            pm2 restart realestate-backend || pm2 start src/server.js --name realestate-backend
            pm2 save

      # ===== NOTIFICATION =====
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend: Restarted with PM2"

      - name: Deployment Failed
        if: failure()
        run: |
          echo "❌ Deployment failed! Check the logs above."
          exit 1
