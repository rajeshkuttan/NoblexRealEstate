# Redis configuration for Copilot (native)
# Install as /etc/redis/redis-copilot.conf — do not expose publicly.

bind 127.0.0.1
port 6380
protected-mode yes
supervised systemd
daemonize no
pidfile /run/redis/redis-copilot.pid
logfile /var/log/redis/redis-copilot.log
dir /var/lib/redis-copilot

appendonly yes
appendfsync everysec
save 60 1

# BullMQ-compatible: do not evict queue keys
maxmemory 256mb
maxmemory-policy noeviction

# Uncomment and set a strong password when needed:
# requirepass CHANGE_ME
# Then: COPILOT_REDIS_URL=redis://:CHANGE_ME@127.0.0.1:6380
